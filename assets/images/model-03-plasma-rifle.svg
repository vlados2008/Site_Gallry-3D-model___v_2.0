<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#350a14" stop-opacity="1"/>
    </radialGradient>
    <!-- Grid lines -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fb7185" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="#350a14"/>
  <rect width="320" height="320" fill="url(#bg)"/>
  <rect width="320" height="320" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M8 28 L8 8 L28 8" stroke="#fb7185" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M292 8 L312 8 L312 28" stroke="#fb7185" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M8 292 L8 312 L28 312" stroke="#fb7185" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M312 292 L312 312 L292 312" stroke="#fb7185" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Model icon -->
  <g color="#fb7185" opacity="0.85">
    <rect x="60" y="140" width="200" height="40" rx="6" stroke="currentColor" stroke-width="2" fill="none"/><rect x="240" y="128" width="40" height="64" rx="4" stroke="currentColor" stroke-width="2" fill="none"/><rect x="60" y="180" width="80" height="48" rx="4" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="200" cy="160" r="10" stroke="currentColor" stroke-width="2" fill="none"/><line x1="60" y1="160" x2="30" y2="160" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Category label -->
  <rect x="10" y="10" width="auto" height="20" rx="3" fill="#350a14" fill-opacity="0.8"/>
  <text x="16" y="26" font-family="'Courier New', monospace" font-size="9"
        font-weight="500" fill="#fb7185" letter-spacing="2" opacity="0.9">WEAPONS</text>

  <!-- Title bottom -->
  <rect x="0" y="286" width="320" height="34" fill="#350a14" fill-opacity="0.85"/>
  <text x="16" y="308" font-family="'Courier New', monospace" font-size="11"
        font-weight="700" fill="#fb7185" letter-spacing="3">PLASMA RIFLE</text>

  <!-- Scan lines overlay -->
  <rect width="320" height="320" fill="none"
        style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)"/>
</svg>
