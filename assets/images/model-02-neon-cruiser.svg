<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#5DE8FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d2535" stop-opacity="1"/>
    </radialGradient>
    <!-- Grid lines -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#5DE8FF" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="#0d2535"/>
  <rect width="320" height="320" fill="url(#bg)"/>
  <rect width="320" height="320" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M8 28 L8 8 L28 8" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M292 8 L312 8 L312 28" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M8 292 L8 312 L28 312" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M312 292 L312 312 L292 312" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Model icon -->
  <g color="#5DE8FF" opacity="0.85">
    <rect x="48" y="128" width="224" height="96" rx="12" stroke="currentColor" stroke-width="2" fill="none"/><path d="M80 128l32-56h96l32 56" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/><circle cx="96" cy="232" r="28" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="224" cy="232" r="28" stroke="currentColor" stroke-width="2" fill="none"/>
  </g>

  <!-- Category label -->
  <rect x="10" y="10" width="auto" height="20" rx="3" fill="#0d2535" fill-opacity="0.8"/>
  <text x="16" y="26" font-family="'Courier New', monospace" font-size="9"
        font-weight="500" fill="#5DE8FF" letter-spacing="2" opacity="0.9">VEHICLES</text>

  <!-- Title bottom -->
  <rect x="0" y="286" width="320" height="34" fill="#0d2535" fill-opacity="0.85"/>
  <text x="16" y="308" font-family="'Courier New', monospace" font-size="11"
        font-weight="700" fill="#5DE8FF" letter-spacing="3">NEON CRUISER</text>

  <!-- Scan lines overlay -->
  <rect width="320" height="320" fill="none"
        style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)"/>
</svg>
