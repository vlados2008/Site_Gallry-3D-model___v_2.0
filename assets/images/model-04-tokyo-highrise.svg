<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#052a1a" stop-opacity="1"/>
    </radialGradient>
    <!-- Grid lines -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#34d399" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="#052a1a"/>
  <rect width="320" height="320" fill="url(#bg)"/>
  <rect width="320" height="320" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M8 28 L8 8 L28 8" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M292 8 L312 8 L312 28" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M8 292 L8 312 L28 312" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M312 292 L312 312 L292 312" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Model icon -->
  <g color="#34d399" opacity="0.85">
    <rect x="120" y="40" width="80" height="240" stroke="currentColor" stroke-width="2" fill="none"/><rect x="80" y="120" width="40" height="160" stroke="currentColor" stroke-width="2" fill="none"/><rect x="200" y="100" width="48" height="180" stroke="currentColor" stroke-width="2" fill="none"/><rect x="130" y="60" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="158" y="60" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="130" y="100" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="158" y="100" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Category label -->
  <rect x="10" y="10" width="auto" height="20" rx="3" fill="#052a1a" fill-opacity="0.8"/>
  <text x="16" y="26" font-family="'Courier New', monospace" font-size="9"
        font-weight="500" fill="#34d399" letter-spacing="2" opacity="0.9">BUILDINGS</text>

  <!-- Title bottom -->
  <rect x="0" y="286" width="320" height="34" fill="#052a1a" fill-opacity="0.85"/>
  <text x="16" y="308" font-family="'Courier New', monospace" font-size="11"
        font-weight="700" fill="#34d399" letter-spacing="3">TOKYO HIGHRISE</text>

  <!-- Scan lines overlay -->
  <rect width="320" height="320" fill="none"
        style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)"/>
</svg>
