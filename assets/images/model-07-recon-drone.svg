<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#5DE8FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#051520" stop-opacity="1"/>
    </radialGradient>
    <!-- Grid lines -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#5DE8FF" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="#051520"/>
  <rect width="320" height="320" fill="url(#bg)"/>
  <rect width="320" height="320" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M8 28 L8 8 L28 8" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M292 8 L312 8 L312 28" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M8 292 L8 312 L28 312" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M312 292 L312 312 L292 312" stroke="#5DE8FF" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Model icon -->
  <g color="#5DE8FF" opacity="0.85">
    <ellipse cx="160" cy="160" rx="100" ry="36" stroke="currentColor" stroke-width="2" fill="none"/><ellipse cx="160" cy="152" rx="48" ry="36" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="160" cy="152" r="16" stroke="currentColor" stroke-width="2" fill="none"/><line x1="60" y1="160" x2="20" y2="180" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="260" y1="160" x2="300" y2="180" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="160" cy="152" r="5" fill="currentColor"/>
  </g>

  <!-- Category label -->
  <rect x="10" y="10" width="auto" height="20" rx="3" fill="#051520" fill-opacity="0.8"/>
  <text x="16" y="26" font-family="'Courier New', monospace" font-size="9"
        font-weight="500" fill="#5DE8FF" letter-spacing="2" opacity="0.9">SCI-FI</text>

  <!-- Title bottom -->
  <rect x="0" y="286" width="320" height="34" fill="#051520" fill-opacity="0.85"/>
  <text x="16" y="308" font-family="'Courier New', monospace" font-size="11"
        font-weight="700" fill="#5DE8FF" letter-spacing="3">RECON DRONE</text>

  <!-- Scan lines overlay -->
  <rect width="320" height="320" fill="none"
        style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)"/>
</svg>
