<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a0a3a" stop-opacity="1"/>
    </radialGradient>
    <!-- Grid lines -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#A78BFA" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="#1a0a3a"/>
  <rect width="320" height="320" fill="url(#bg)"/>
  <rect width="320" height="320" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M8 28 L8 8 L28 8" stroke="#A78BFA" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M292 8 L312 8 L312 28" stroke="#A78BFA" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M8 292 L8 312 L28 312" stroke="#A78BFA" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M312 292 L312 312 L292 312" stroke="#A78BFA" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Model icon -->
  <g color="#A78BFA" opacity="0.85">
    <circle cx="160" cy="88" r="44" stroke="currentColor" stroke-width="2" fill="none"/><rect x="116" y="140" width="88" height="100" rx="8" stroke="currentColor" stroke-width="2" fill="none"/><path d="M116 160l-40 24M204 160l40 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M116 240l-16 48M204 240l16 48" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="148" cy="88" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="172" cy="88" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Category label -->
  <rect x="10" y="10" width="auto" height="20" rx="3" fill="#1a0a3a" fill-opacity="0.8"/>
  <text x="16" y="26" font-family="'Courier New', monospace" font-size="9"
        font-weight="500" fill="#A78BFA" letter-spacing="2" opacity="0.9">CHARACTERS</text>

  <!-- Title bottom -->
  <rect x="0" y="286" width="320" height="34" fill="#1a0a3a" fill-opacity="0.85"/>
  <text x="16" y="308" font-family="'Courier New', monospace" font-size="11"
        font-weight="700" fill="#A78BFA" letter-spacing="3">ANDROID PILOT</text>

  <!-- Scan lines overlay -->
  <rect width="320" height="320" fill="none"
        style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)"/>
</svg>
