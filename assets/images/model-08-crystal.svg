<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a1000" stop-opacity="1"/>
    </radialGradient>
    <!-- Grid lines -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fbbf24" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="#1a1000"/>
  <rect width="320" height="320" fill="url(#bg)"/>
  <rect width="320" height="320" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M8 28 L8 8 L28 8" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M292 8 L312 8 L312 28" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M8 292 L8 312 L28 312" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M312 292 L312 312 L292 312" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Model icon -->
  <g color="#fbbf24" opacity="0.85">
    <path d="M160 60 L200 120 L240 200 L160 280 L80 200 L120 120 Z" stroke="currentColor" stroke-width="2" fill="none"/><path d="M160 60 L140 140 L160 280" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4"/><path d="M160 60 L180 140" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4"/><path d="M120 120 L200 120" stroke="currentColor" stroke-width="1.5"/><path d="M80 200 L240 200" stroke="currentColor" stroke-width="1.5"/><circle cx="160" cy="60" r="6" fill="currentColor"/>
  </g>

  <!-- Category label -->
  <rect x="10" y="10" width="auto" height="20" rx="3" fill="#1a1000" fill-opacity="0.8"/>
  <text x="16" y="26" font-family="'Courier New', monospace" font-size="9"
        font-weight="500" fill="#fbbf24" letter-spacing="2" opacity="0.9">OTHER</text>

  <!-- Title bottom -->
  <rect x="0" y="286" width="320" height="34" fill="#1a1000" fill-opacity="0.85"/>
  <text x="16" y="308" font-family="'Courier New', monospace" font-size="11"
        font-weight="700" fill="#fbbf24" letter-spacing="3">CRYSTAL FORMATION</text>

  <!-- Scan lines overlay -->
  <rect width="320" height="320" fill="none"
        style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)"/>
</svg>
